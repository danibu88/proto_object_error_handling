version: "3.8"

networks:
  nginx-net:
    external:
      name: nginx-net
  streamlit-net:

services:
  streamlit:
    build: .
    restart: unless-stopped
    networks:
      - nginx-net
      - streamlit-net
    environment:
      - VIRTUAL_HOST=tsb.respeak.io
      - VIRTUAL_PORT=8501
      - LETSENCRYPT_HOST=tsb.respeak.io
      - LETSENCRYPT_EMAIL=tim.rietz@respeak.io
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - CHAT_API_URL=${CHAT_API_URL}
      - CHAT_EXPERT_ID=${CHAT_EXPERT_ID}
      - RESPEAK_API_KEY=${RESPEAK_API_KEY}
    ports:
      - "8501:8501"
    depends_on:
      - db

  db:
    image: postgres:17
    networks:
      - streamlit-net
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
    restart: unless-stopped

volumes:
  postgres_data: